<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petri Net Simulator</title>
</head>
<body>
    <div id="splash">
        <div class="spinner"></div>
        <div style="font-size: 1.5rem; font-weight: 600; color: #e2e8f0;">PetriNet Simulator</div>
        <div style="font-size: 0.875rem; color: #94a3b8; margin-top: 8px;">Loading environment...</div>
    </div>

    <div id="app">
        <div id="warning-banner" class="warning-banner" style="display: none;">
            <span>Note: Designs saved locally are only available in this browser. Please use Export to download your design for use on other browsers/devices.</span>
            <button class="warning-close" id="warning-close-btn">&times;</button>
        </div>
        <!-- Canvas -->
        <div class="canvas-container">
            <canvas id="petrinet-canvas"></canvas>
        </div>

        <!-- Toolbars -->
        <div id="left-toolbar" class="toolbar"></div>
        <div id="top-toolbar" class="toolbar"></div>

        <!-- Controls Panel -->
        <div id="controls-panel" style="position: absolute; top: 16px; right: 16px; z-index: 10; display: flex; gap: 12px; flex-direction: column;">
            <div class="segmented-control" id="theme-switch" style="width: 160px;">
                <div class="segment-active-bg" style="width: calc(50% - 4px); left: 4px;"></div>
                <button class="segment-btn active" data-value="dark" style="width: 50%; justify-content: center;"><i data-lucide="moon" style="width: 14px; height: 14px;"></i> Dark</button>
                <button class="segment-btn" data-value="light" style="width: 50%; justify-content: center;"><i data-lucide="sun" style="width: 14px; height: 14px;"></i> Light</button>
            </div>
            
            <div class="segmented-control" id="model-switch" style="width: 160px;">
                <div class="segment-active-bg" style="width: calc(50% - 4px); left: 4px;"></div>
                <button class="segment-btn active" data-value="T" style="width: 50%; justify-content: center;"><i data-lucide="circle" style="width: 14px; height: 14px;"></i> T-Model</button>
                <button class="segment-btn" data-value="S" style="width: 50%; justify-content: center;"><i data-lucide="zap" style="width: 14px; height: 14px;"></i> S-Model</button>
            </div>
        </div>

        <!-- Properties Panel -->
        <div id="properties-panel"></div>

        <!-- Status Bar -->
        <div id="status-bar">
            <div class="status-left">
                <span id="model-badge" class="model-badge t-model">T-Model</span>
                <span style="color: var(--text-muted);">|</span>
                <span id="file-name-display" style="font-weight: 500;">Untitled</span>
            </div>
            <div class="status-right">
                <span id="zoom-display">100%</span>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
